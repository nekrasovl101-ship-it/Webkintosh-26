<div class="liquidGlass-wrapper dock">

          <div class="liquidGlass-tint"></div>

          <div class="liquidGlass-text">
              <svg style="display: none">
      <filter
        id="glass-distortion"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        filterUnits="objectBoundingBox"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.01 0.01"
          numOctaves="1"
          seed="5"
          result="turbulence"
        />
        <!-- Seeds: 14, 17,  -->

        <feComponentTransfer in="turbulence" result="mapped">
          <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
          <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
          <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
        </feComponentTransfer>

        <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />

        <feSpecularLighting
          in="softMap"
          surfaceScale="5"
          specularConstant="1"
          specularExponent="100"
          lighting-color="white"
          result="specLight"
        >
          <fePointLight x="-200" y="-200" z="300" />
        </feSpecularLighting>

        <feComposite
          in="specLight"
          operator="arithmetic"
          k1="0"
          k2="1"
          k3="1"
          k4="0"
          result="litImage"
        />

        <feDisplacementMap
          in="SourceGraphic"
          in2="softMap"
          scale="150"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>

<script>
function openApp(id){
  const app = document.getElementById(id);
  app.style.display = "block";
}

function closeApp(id){
  document.getElementById(id).style.display = "none";
}

function fullscreenApp(id){
  const app = document.getElementById(id);

  if(app.dataset.fullscreen !== "true"){
    app.dataset.oldTop = app.style.top || "200px";
    app.dataset.oldLeft = app.style.left || "300px";
    app.dataset.oldWidth = app.style.width || "500px";
    app.dataset.oldHeight = app.style.height || "300px";

    app.style.top = "0";
    app.style.left = "0";
    app.style.width = "100vw";
    app.style.height = "100vh";

    app.dataset.fullscreen = "true";
  } else {
    app.style.top = app.dataset.oldTop;
    app.style.left = app.dataset.oldLeft;
    app.style.width = app.dataset.oldWidth;
    app.style.height = app.dataset.oldHeight;

    app.dataset.fullscreen = "false";
  }
}

// перетаскивание каждого окна
let currentWindow = null;
let offsetX = 0;
let offsetY = 0;

document.querySelectorAll(".bar").forEach(bar => {
  bar.addEventListener("mousedown", function(e){
    currentWindow = this.parentElement;

    if(currentWindow.dataset.fullscreen === "true") return;

    offsetX = e.clientX - currentWindow.offsetLeft;
    offsetY = e.clientY - currentWindow.offsetTop;
  });
});

document.addEventListener("mousemove", function(e){
  if(currentWindow){
    if(currentWindow.dataset.fullscreen === "true") return;

    currentWindow.style.left = (e.clientX - offsetX) + "px";
    currentWindow.style.top = (e.clientY - offsetY) + "px";
  }
});

document.addEventListener("mouseup", function(){
  currentWindow = null;
});
</script>
